<!DOCTYPE html>
<html lang="ug" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بىلىك ئىستراتېگىيەلىك ئانالىز سۇپىسى v10.0 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        @font-face { font-family: 'UKIJ Ekran'; src: local('UKIJ Ekran'), local('UKIJ_Ekran'); }
        @font-face { font-family: 'UKIJ Tuz'; src: local('UKIJ Tuz'), local('UKIJ_Tuz'); }
        body { font-family: "UKIJ Ekran", "Noto Naskh Arabic", sans-serif; background: #0f172a; color: #e2e8f0; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #f59e0b; border-radius: 4px; }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <!-- Header -->
    <header class="h-16 border-b border-slate-700 bg-slate-900 flex items-center justify-between px-6 z-50 shadow-2xl">
        <div class="flex items-center gap-4">
            <div class="bg-amber-500 text-slate-900 w-10 h-10 rounded-lg flex items-center justify-center font-bold text-2xl">B</div>
            <div>
                <h1 class="text-xl font-bold text-white">بىلىك تەتقىقات مەركىزى <span class="text-amber-500 text-xs">v10.0 Pro</span></h1>
                <p class="text-[10px] text-slate-400 font-mono tracking-widest uppercase">Global Strategic Analysis Engine</p>
            </div>
        </div>
        <div id="clock" class="text-xs text-amber-500 font-mono"></div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- Control Panel -->
        <aside class="w-[480px] border-l border-slate-700 bg-slate-800/50 flex flex-col z-40">
            
            <div class="p-4 bg-slate-900/50 border-b border-slate-700">
                <label class="block text-[10px] font-bold text-amber-500 mb-2 uppercase">1. ژۇرنال ۋە ئانالىز تۈرى</label>
                <select id="journalSelect" onchange="loadJournalPrompt()" class="w-full bg-slate-800 border border-slate-600 text-white text-sm rounded-lg p-3 outline-none focus:ring-2 focus:ring-amber-500 transition-all">
                    <option value="economist">💹 The Economist (ئىقتىساد ۋە بازار)</option>
                    <option value="foreign_affairs">🌍 Foreign Affairs (دۇنياۋى ئىستراتېگىيە)</option>
                    <option value="foreign_policy">🛡️ Foreign Policy (تاشقى سىياسەت)</option>
                    <option value="hbr">👔 Harvard Business Review (باشقۇرۇش پېشىۋاسى)</option>
                    <option value="ft">💰 Financial Times (مالىيە ۋە ئىقتىساد)</option>
                    <option value="nature">🔬 Nature / Science (ئەڭ يېڭى ئىلىم-پەن)</option>
                    <option value="mit">🤖 MIT Tech Review (تېخنىكا يۈزلىنىشى)</option>
                    <option value="wired">📡 Wired (رەقەملىك ئۆزگىرىش)</option>
                    <option value="atlantic">🏛️ The Atlantic (جەمئىيەت ۋە پىكىر)</option>
                    <option value="janes">⚔️ Jane's Defence (ھەربىي-ئىستىخبارات)</option>
                </select>
            </div>

            <div class="flex-1 p-4 flex flex-col min-h-0">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[10px] text-slate-400 font-bold">AI غا بېرىدىغان مەخسۇس بۇيرۇق:</span>
                    <button onclick="copyPromptText()" class="bg-amber-600 hover:bg-amber-500 text-white text-[10px] px-3 py-1 rounded-full transition shadow-lg">كۆچۈرۈش 📋</button>
                </div>
                <textarea id="promptArea" readonly class="w-full flex-1 bg-slate-900 border border-slate-700 rounded-xl p-3 text-[10px] font-mono text-slate-300 resize-none outline-none leading-relaxed border-dashed" dir="ltr"></textarea>
            </div>

            <div class="p-4 bg-slate-900/80 border-t border-slate-700">
                <label class="block text-[10px] font-bold text-emerald-500 mb-2 uppercase">2. نەتىجە JSON نى چاپلاڭ</label>
                <textarea id="jsonInput" class="w-full h-32 bg-slate-950 border border-slate-700 rounded-xl p-3 text-[10px] font-mono text-emerald-400 outline-none mb-3 focus:border-emerald-500 transition-all" placeholder="{ ... }" dir="ltr"></textarea>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="renderFinalReport()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl text-sm transition shadow-lg flex items-center justify-center gap-2"><span>⚡</span> ئانالىزلاش</button>
                    <button onclick="saveReportHTML()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl text-sm transition shadow-lg flex items-center justify-center gap-2"><span>💾</span> ساقلاش</button>
                </div>
            </div>
        </aside>

        <!-- Preview Area -->
        <div class="flex-1 bg-slate-950 relative overflow-hidden">
            <iframe id="reportPreview" class="w-full h-full border-none bg-white"></iframe>
        </div>
    </main>

    <script>
        // --- PROMPT ENGINE ---
        const commonRules = `
!!! بەك مۇھىم: مەن ساڭا بەرگىن بارلىق ماقالىلەرنى چوقۇم ھەممىنىڭ خۇلاسىسىنى 15 ئۇزۇن جۈملە بىلەن قوشۇپ چىقىرپ بەر ئېسىڭدە بولسۇنكى بىرمۇ ماقالە چۈشۈپ قالمىسۇن.
ھەربىر ماقالىگە مۇناسىۋەتلىك بارلىق سىتاتىستىكىلىق پاكىتلارنى يىغىپ بەر. شۇنداقلا ھەر بىر ماقالىنىڭ ئاپتورى كىم، ئۇنىڭ قىسقىچە تەرجىمىھالى [ئېسڭدە بولسۇنكى!! ئاپتورنىڭ كىملىك ۋە قىسقا تەرجىمىھالىنى چوقۇم قوشقىن!!] ۋە تەگلىكى نېمە، شۇنى چوقۇم قوشۇپ ياز.
ئالاھىدە تەۋسىيە (بۇ بەك مۇھىم ھەرگىز چالا يازما. تولۇق ۋە ئىسىل ياز!!): 1) بۇ ماقالىلەردىن شەخسكە قانداق تەۋسىيە بېرىسەن؟ بۇنى بىرنەچچە تۈرلۈك قىلىپ ئۇزۇنراق ياز (Array شەكلىدە بىرنەچچە نۇقتا قىل). 2) چوڭ تىپتىكى مەبلەغ سالغۇچىغا قانداق تەكلىپ بېرىسەن؟ 3) شەرقىي تۈركىستان دۆلەتچىلىك ئىقتىسادىي ياكى سىياسىي پىكرى بويىچە بۇ ماقالىنىڭ نېمىنى تەسىيە قىلىسەن؟
ھېچقانداق يەرگە قەتئىي شىنجاڭ دەپ يازما چوقۇم شەرقىي تۈركىستان دەپ ياز. جۇڭگونى خىتاي دەپ ياز.
!! بىرمۇ ماقالىنى چۈشۈرپ قويما. قانچە ماقالە بولسا شۇنچە ماقالىنى ئۇزۇن ئۇزۇن ياز...
سۇممارىي قىسىمىغا 1.2.3. دەپ ھەربىر جۈملىگە نومۇر قويۇپ قويماي راھەت ۋە ئۇزۇن خۇلاسە يازغىن.!!
نەتىجىنى پەقەتلا JSON فورماتىدا قايتۇر. باشقا ئەسكەرتىش يازما.`;

        const jsonSchema = `
### JSON فورماتى (مۇشۇ قېلىپتا قايتۇر):
{
  "report_title": "...",
  "journal_name": "...",
  "global_summary": { "uy": "...", "en": "...", "ar": "..." },
  "articles": [
    { 
      "title_uy": "...", "title_en": "...", 
      "author": "...", "author_bio": "...", 
      "url": "...", "summary": "...", 
      "stats": ["سەھىيە سىتاتىستىكىسى...", "مالىيە كۆرسەتكۈچى..."] 
    },
    { 
      "title_uy": "...", "title_en": "...", 
      "author": "...", "author_bio": "...", 
      "url": "...", "summary": "...", 
      "stats": ["...", "..."] 
    }
  ],
  "quotes": [ { "text": "...", "speaker": "..." } ],
  "east_turkistan_analysis": { "critical_articles": ["..."], "lessons": ["..."], "geopolitics": "..." },
  "islamic_analysis": {
    "perspective": "...",
    "quran_ar": "...", "quran_uy": "...",
    "hadith_ar": "...", "hadith_uy": "...",
    "history_example": "...", "sharia_economy_tip": "...", "scholar_advice": "..."
  },
  "special_recommendations": {
    "personal": ["تەۋسىيە 1: ...", "تەۋسىيە 2: ...", "تەۋسىيە 3: ..."],
    "large_investor": "...",
    "statehood_economy": "..."
  },
  "strategy_steps": [ { "step": "...", "action": "..." } ],
  "terms": [ { "term": "...", "desc": "..." } ],
  "books": [ { "title": "...", "author": "...", "summary": "...", "benefit": "..." } ]
}`;

        const templates = {
            economist: `مەن ساڭا «The Economist» ژۇرنىلىنىڭ بىر نەچچە ماقالىلىرىنى بېرىمەن. سەن «بىلىك تەتقىقات مەركىزى» نىڭ باش ئىقتىساد ئانالىزچىسى سالاھىيىتىدە تەھلىل قىل.
1. چوڭ خۇلاسە: دۇنيا ئىقتىسادىي يۈزلىنىشى ھەققىدە 3 تىلدا (ئۇيغۇرچە، ئېنگلىزچە، ئەرەبچە) چوڭقۇر تەھلىل.
2. ماقالە تەپسىلاتى: ئىسمى، مەنبەسى، ئاپتورى، ئاپتورنىڭ تەرجىمىھالى ۋە 15 جۈملىلىك خۇلاسە.
3. سانلىق مەلۇمات: بازار قىممىتى، ئۆسۈم نىسبىتى، پۇل پاخاللىقى قاتارلىق بارلىق سانلارنى تىزىپ بەر.
4. شەرقىي تۈركىستان ئۈچۈن: خىتاي ئىقتىسادىنىڭ چېكىنىشى ياكى يۈزلىنىشىنىڭ مۇستەقىللىق ھەرىكىتىمىزگە بولغان پايدىسى.
5. ئىستراتېگىيە: ئۇيغۇر مەبلەغ سالغۇچىلار ۋە سىياسىي پائالىيەتچىلەر ئۈچۈن ئەمەلىي تەۋسىيە.
6. ئىسلامىي ئىقتىساد: ماقالىدىكى تېمىلارنى ئىسلامىي مالىيە نۇقتىسىدىن تەھلىل قىل، ئىبنى خالدۇن قاتارلىق ئالىملارنىڭ ئىقتىسادىي پىكرىنى سېلىشتۇر، ئايەت ۋە ھەدىس قوش.` + commonRules + jsonSchema,

            foreign_affairs: `مەن ساڭا «Foreign Affairs» ژۇرنىلىنىڭ ماقالىلىرىنى بېرىمەن. سەن «بىلىك تەتقىقات مەركىزى» نىڭ خەلقئارا مۇناسىۋەتلەر مۇتەخەسسىسى سالاھىيىتىدە تەھلىل قىل.
1. چوڭ خۇلاسە: جۇغراپىيىلىك سىياسەت ۋە دۇنيا تەرتىپىنىڭ ئۆزگىرىشى ھەققىدە 3 تىلدا تەھلىل.
2. ماقالە تەپسىلاتى: ئاپتور ۋە ئۇنىڭ تەرجىمىھالى، تاشقى سىياسەت ئىستراتېگىيەلىرىنىڭ 15 جۈملىلىك تەپسىلىي خۇلاسىسى.
3. شەرقىي تۈركىستان ئۈچۈن: دۇنيادىكى يېڭى سىياسىي قۇتۇپلىشىشنىڭ مۇستەقىللىق ئۈچۈن پۇرسەتلىرى.
4. ئالاھىدە تەۋسىيە: شەخسلەر، سىياسىي لىدېرلار ۋە دۆلەتچىلىك تاشقى سىياسىتى ھەققىدە تەۋسىيە.
5. ئىسلامىي تەھلىل: دۆلەت مۇناسىۋىتى ۋە ئادالەت ھەققىدىكى ئايەت-ھەدىسلەر، پەيغەمبەر ئەلەيھىسسالامنىڭ دىپلوماتىيەسىدىن مىساللار.` + commonRules + jsonSchema,

            janes: `مەن ساڭا «Jane's Defence Weekly» ھەربىي ژۇرنىلىنىڭ ماقالىلىرىنى بېرىمەن. سەن ھەربىي ۋە ئىستىخبارات ئانالىزچىسى سالاھىيىتىدە تەھلىل قىل.
1. ھەربىي خۇلاسە: دۇنيا قوراللىق توقۇنۇشلىرى ۋە يېڭى قورال تېخنىكىلىرى ھەققىدە 3 تىلدا.
2. تەپسىلات: ئاپتور تەرجىمىھالى بىلەن قورال سىستېمىلىرىنىڭ 15 جۈملىلىك تەھلىلى ۋە سىتاتىستىكىسى.
3. شەرقىي تۈركىستان: خىتاي ئارمىيەسىنىڭ ئاجىزلىقلىرى ۋە زامانىۋى ئۇرۇش تېكتىكىلىرى.
4. تەۋسىيە: شەخسىي بىخەتەرلىك، مۇداپىئە ساھەسىدىكى چوڭ مەبلەغ ۋە دۆلەت مۇداپىئەسى ھەققىدە تەۋسىيەلەر.
5. ئىسلامىي نۇقتىئىنەزەر: جىھاد، مۇداپىئە ئەخلاقى ۋە خالىد بىن ۋەلىد قاتارلىق سەركەردىلەرنىڭ تارىخى تەجرىبىلىرى.` + commonRules + jsonSchema,

            hbr: `مەن ساڭا «Harvard Business Review» ژۇرنىلىنىڭ ماقالىلىرىنى بېرىمەن. سەن كارخانا ۋە تەشكىلات باشقۇرۇش مەسلىھەتچىسى سالاھىيىتىدە تەھلىل قىل.
1. چوڭ خۇلاسە: باشقۇرۇش ئىلمى، رەھبەرلىك ماھارىتى ھەققىدە 3 تىلدا تەھلىل.
2. تەپسىلات: ماقالە، ئاپتور تارىخى ۋە 15 جۈملىلىك تەشكىلىي قۇرۇلما ئانالىزى.
3. شەرقىي تۈركىستان: سىياسىي ۋە ئىجتىمائىي تەشكىلاتلىرىمىزنىڭ سۈپىتىنى ۋە باشقۇرۇش ئىقتىدارىنى قانداق ئۆستۈرىمىز؟
4. تەۋسىيە: شەخسنىڭ رەھبەرلىك كۈچىنى ئاشۇرۇش سىرلىرى، شىركەتلەرگە مەسلىھەت ۋە دۆلەت ئاپپاراتى باشقۇرۇش تەسەۋۋۇرى.
5. ئىسلامىي ئانالىز: شۇرا (مەسلىھەت كېڭىشى)، ئادالەت، ۋە ئۆمەر رەزىيەللاھۇ ئەنھۇنىڭ دۆلەت باشقۇرۇشتىكى ئۈلگىلىرى.` + commonRules + jsonSchema,

            ft: `مەن ساڭا «Financial Times» ماقالىلىرىنى بېرىمەن. سەن خەلقئارا پۇل-مۇئامىلە مۇتەخەسسىسى سالاھىيىتىدە تەھلىل قىل.
1. چوڭ خۇلاسە: دۇنيا پاي چېكى، مالىيە سىياسىتى ۋە مەبلەغ يۈزلىنىشى ھەققىدە 3 تىلدا.
2. تەپسىلات: ئاپتور تەرجىمىھالى ۋە 15 جۈملىلىك بازار ئانالىزى. پاي چېكى قاتارلىق رەقەملەرنى چۈشۈرۈپ قويماي سىتاتىستىكا قىل.
3. شەرقىي تۈركىستان: خىتاي ئىقتىسادىي كرىزىسى ۋە مۇسۇلمان ئۇيغۇرلارنىڭ خەلقئارا مالىيەدىكى ئورنى.
4. تەۋسىيە: شەخسىي پاي چېكى مەبلىغى تەۋسىيەسى، چوڭ كاپىتال سالغۇچىلارغا تەھلىل ۋە دۆلەت مەركىزىي بانكا سىستېمىسى.
5. ئىسلامىي ئانالىز: پائىزسىز مالىيە سىستېمىسىنىڭ پايدىسى ۋە مۇناسىۋەتلىك ئايەت-ھەدىسلەر.` + commonRules + jsonSchema,

            nature: `مەن ساڭا «Nature» ياكى «Science» ژۇرنىلىنىڭ ماقالىلىرىنى بېرىمەن. سەن ئىلىم-پەن ئانالىزچىسى سالاھىيىتىدە تەھلىل قىل.
1. چوڭ خۇلاسە: ئەڭ يېڭى تەبىئىي پەن بايقاشلىرى ۋە ئۇنىڭ دۇنياغا تەسىرى ھەققىدە 3 تىلدا تەھلىل.
2. تەپسىلات: ئالىملارنىڭ قىسقىچە تەرجىمىھالى، 15 جۈملىلىك پەن-تېخنىكا بايقاش تەھلىلى.
3. شەرقىي تۈركىستان: بۇ يېڭى ئىلىم-پەن تەرەققىياتىنىڭ شەرقىي تۈركىستانلىقلار ئۈچۈن قايسى جەھەتلەردىن ئەھمىيىتى بار.
4. تەۋسىيە: ياشلارنى قايسى ساھەگە يېتەكلەش، پەن ساھەسىگە چوڭ مەبلەغ سېلىش ۋە دۆلەت مائارىپ/تەتقىقات نىشانى.
5. ئىسلامىي ئانالىز: قۇرئاندىكى ئىلمىي مۆجىزىلەر بىلەن باغلانغان تەھلىل، ئىسلام تارىخىدىكى ئۇلۇغ ئالىملار مىسالى.` + commonRules + jsonSchema,

            mit: `مەن ساڭا «MIT Technology Review» ماقالىلىرىنى بېرىمەن. سەن رەقەملىك تېخنىكا ئانالىزچىسى سالاھىيىتىدە تەھلىل قىل.
1. چوڭ خۇلاسە: سۈنئىي ئەقىل (AI)، ماشىنا ئادەم، بىئوتېخنىكا يۈزلىنىشى ھەققىدە 3 تىلدا.
2. تەپسىلات: تېخنىكا يازغۇچىسىنىڭ تەرجىمىھالى، 15 جۈملىلىك سۈنئىي ئەقىل ۋە يېڭىلىقلار تەھلىلى.
3. شەرقىي تۈركىستان: خىتاينىڭ تېخنىكىلىق نازارىتىدىن قېچىش، رەقەملىك بىخەتەرلىك.
4. تەۋسىيە: شەخسىي رەقەملىك ماھارەت يېتىلدۈرۈش، IT شىركەتلىرىگە مەبلەغ سېلىش، مۇستەقىل دۆلەتنىڭ رەقەملىك قۇرۇلمىسى.
5. ئىسلامىي ئانالىز: تېخنىكىنىڭ ئەخلاقىي چەك-چېگرىسى ۋە ئىنساننىڭ يەر يۈزىدىكى خەلىپىلىك ۋەزىپىسى.` + commonRules + jsonSchema,

            wired: `مەن ساڭا «Wired» ژۇرنىلىنىڭ ماقالىلىرىنى بېرىمەن. سەن تور ۋە رەقەملىك مەدەنىيەت ئانالىزچىسى سالاھىيىتىدە تەھلىل قىل.
1. چوڭ خۇلاسە: ئىجتىمائىي تاراتقۇ، رەقەملىك سىياسەت ۋە سىبېربىخەتەرلىك ھەققىدە 3 تىلدا.

                <script>
                    const UY_TO_ULY_MAP = {'ا':'a','ە':'e','ب':'b','پ':'p','ت':'t','ج':'j','چ':'ch','خ':'x','د':'d','ر':'r','ز':'z','ژ':'zh','س':'s','ش':'sh','غ':'gh','ف':'f','ق':'q','ك':'k','گ':'g','ڭ':'ng','ل':'l','م':'m','ن':'n','ھ':'h','و':'o','ۇ':'u','ۆ':'o','ۈ':'u','ي':'y','ۋ':'v','ې':'e','ى':'i','ئ':'','؟':'?'};
                    const UY_TO_ULY_MAPT = {'ا':'a','ە':'e','ب':'b','پ':'p','ت':'t','ج':'c','چ':'ç','خ':'hh','د':'d','ر':'r','ز':'z','ژ':'j','س':'s','ش':'ş','غ':'gh','f':'f','ق':'k','ك':'k','گ':'g','ڭ':'n','ل':'l','م':'m','ن':'n','ھ':'h','و':'o','ۇ':'u','ۆ':'ö','ۈ':'ü','ي':'y','ۋ':'v','ې':'e','ى':'i','ئ':'','؟':'?'};

                    }

                    let chunks = [];
                    let chunkIndex = 0;
                    let isReading = false;

                    function toggleControls() {
                        const panel = document.getElementById('controlPanelMain');
                        const btn = document.getElementById('toggleBtn');
                        if (panel.classList.contains('hidden')) {
                            panel.classList.remove('hidden');
                            btn.innerHTML = '▼';
                        } else {
                            panel.classList.add('hidden');
                            btn.innerHTML = '⚙️';
                        }
                    }

                    function startReading() {
                        stopReading();
                        isReading = true;
                        
                        const voiceVal = document.getElementById('voiceSelect').value;
                        const reportEl = document.getElementById('report-content');
                        let clone = reportEl.cloneNode(true);
                        let fullText = "";

                        // --- Language Logic ---
                        if (voiceVal === 'ar-SA') {
                            const arSummary = clone.querySelector('#summary-ar p');
                            fullText = arSummary ? arSummary.innerText : "تېكىست تېپىلمىدى";
                        } else if (voiceVal === 'en-US') {
                            const enSummary = clone.querySelector('#summary-en p');
                            fullText = enSummary ? enSummary.innerText : "Text not found";
                        } else {
                            // Uyghur Mode: Read Everything EXCEPT Foreign Summaries
                            const noTts = clone.querySelectorAll('.no-tts');
                            noTts.forEach(el => el.remove());
                            fullText = clone.innerText;
                        }

                        // --- Chunking & Deduplication ---
                        let rawChunks = fullText.split(/\\n+/);
                        chunks = [];
                        let lastChunk = "";
                        for (let i = 0; i < rawChunks.length; i++) {
                            let clean = rawChunks[i].trim();
                            if (clean.length > 0 && clean !== lastChunk) {
                                chunks.push(clean);
                                lastChunk = clean;
                            }
                        }

                        chunkIndex = 0;
                        speakNextChunk();
                    }

                    function speakNextChunk() {
                        if (!isReading) return;
                        if (chunkIndex >= chunks.length) {
                            isReading = false;
                            return;
                        }

                        const voiceVal = document.getElementById('voiceSelect').value;
                        const rateVal = parseFloat(document.getElementById('rateSelect').value);
                        let chunkText = chunks[chunkIndex];
                        let finalText = chunkText;

                        // Apply mapping only for Uyghur voices
                        if(voiceVal === 'ug-UG0') finalText = convertForTTS(chunkText, UY_TO_ULY_MAPT);
                        else if (voiceVal === 'ug-UG') finalText = convertForTTS(chunkText, UY_TO_ULY_MAP);

                        const utterance = new SpeechSynthesisUtterance(finalText);
                        const voices = window.speechSynthesis.getVoices();
                        let chosenVoice = null;
                        
                        if(voiceVal === 'ug-UG0') chosenVoice = voices.find(v => v.lang === 'tr-TR');
                        else if (voiceVal === 'ug-UG') chosenVoice = voices.find(v => v.lang === 'uz-UZ' && v.name.includes('Madina')) || voices.find(v => v.lang.includes('tr'));
                        else chosenVoice = voices.find(v => v.lang === voiceVal);

                        if(chosenVoice) utterance.voice = chosenVoice;
                        utterance.rate = rateVal;

                        utterance.onend = function() {
                            if (isReading) {
                                chunkIndex++;
                                speakNextChunk();
                            }
                        };
                        utterance.onerror = function() { if (isReading) { chunkIndex++; speakNextChunk(); } };

                        window.speechSynthesis.speak(utterance);
                    }

                    function nextChunk() {
                        if (!isReading || chunks.length === 0) return;
                        window.speechSynthesis.cancel();
                    }

                    function prevChunk() {
                        if (!isReading || chunks.length === 0) return;
                        if (chunkIndex > 0) {
                            chunkIndex -= 2; 
                            if (chunkIndex < -1) chunkIndex = -1;
                            window.speechSynthesis.cancel();
                        }
                    }

                    function stopReading() { 
                        isReading = false;
                        window.speechSynthesis.cancel(); 
                    }

                    function savePDF() {
                        const el = document.getElementById('report-content');
                        const d = new Date();
                        const f = (n) => n.toString().padStart(2, '0');
                        const fname = \`Bilik_Report_\${d.getFullYear()}-\${f(d.getMonth()+1)}-\${f(d.getDate())}_\${f(d.getHours())}-\${f(d.getMinutes())}-\${f(d.getSeconds())}.pdf\`;
                        
                        const opt = { margin: [10,10,10,10], filename: fname, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4' } };
                        html2pdf().set(opt).from(el).save();
                    }
                <\/script>
            </body>
            </html>`;
            return htmlContent;
        }

        // Clock logic
        setInterval(() => {
            const d = new Date();
            document.getElementById('clock').innerText = d.toLocaleDateString('ug-CN') + ' ' + d.toLocaleTimeString('ug-CN');
        }, 1000);
    </script>
</body>
</html>
